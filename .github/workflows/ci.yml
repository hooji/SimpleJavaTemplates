name: CI

on:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.os }} / JDK ${{ matrix.java }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        java: ['8', '11', '17', '21', '25']
        exclude:
          # Temurin no longer publishes JDK 8 for macOS arm64 (which is
          # what macos-latest is on actions/setup-java).
          - os: macos-latest
            java: '8'

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: maven

      - name: Build
        run: mvn -B clean package

      - name: Smoke tests
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            SEP=";"
          else
            SEP=":"
          fi
          JAR="$(find target -maxdepth 1 -name 'SimpleJavaTemplates-*.jar' \
            ! -name 'original-*' -print | head -1)"
          if [ -z "$JAR" ]; then
            echo "build artifact not found in target/" >&2
            ls -la target/ >&2
            exit 1
          fi
          # Copy the H2 jar (a test-scope Maven dependency) to a known
          # relative path. Using a path under target/ avoids Git-Bash MSYS
          # argument-conversion quirks on Windows that mangle absolute
          # paths inside a `;`-separated classpath, which silently dropped
          # H2 from the classpath and broke SqlTest.
          mkdir -p target/test-libs
          H2_SRC="$(find "$HOME/.m2/repository/com/h2database" -name 'h2-*.jar' | head -1)"
          if [ -z "$H2_SRC" ]; then
            echo "h2 dependency jar not found in ~/.m2/repository" >&2
            exit 1
          fi
          cp "$H2_SRC" target/test-libs/h2.jar
          H2="target/test-libs/h2.jar"
          echo "agent jar: $JAR"
          echo "h2 jar:    $H2"

          run() {
            local name="$1"
            local extra="${2:-}"
            local cp="$JAR${SEP}target/test-classes"
            if [ -n "$extra" ]; then cp="$cp${SEP}$extra"; fi
            echo "::group::$name (JDK ${{ matrix.java }} on ${{ matrix.os }})"
            java -javaagent:"$JAR" -cp "$cp" \
              "ai.jacc.simplejavatemplates.smoketest.$name"
            echo "::endgroup::"
          }

          run SmokeTest
          run ScopeResolutionTest
          run TemplateExpanderTest
          run CustomAnnotatedMethodTest
          run LoadOrderTest
          run SqlTest "$H2"

          # PatternMatchingTest uses Java 21+ language features and is only
          # compiled when the build JDK is 21+ (see the tests-java21 profile
          # in pom.xml). Match that here.
          if [ "${{ matrix.java }}" -ge 21 ]; then
            run PatternMatchingTest
          else
            echo "Skipping PatternMatchingTest (JDK ${{ matrix.java }} < 21)"
          fi
